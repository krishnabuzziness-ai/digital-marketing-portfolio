<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ Competitor's IQ — Brand Intelligence Platform</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #2c3e50; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        button { background: #16a085; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #117a65; }
        .output-box { display: none; background: #f9f9f9; border-left: 5px solid #16a085; padding: 15px; text-align: left; margin-top: 20px; border-radius: 4px; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: 'Arial', sans-serif; font-size: 0.95rem; line-height: 1.5; color: #444; }
        .copy-btn { background: #2c3e50; font-size: 0.9rem; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ Competitor's IQ</h1>
    <p style="color: #7f8c8d;">Generate advanced AI Framework Prompts to dissect any competitor's strategy.</p>
    
    <input type="text" id="myBrand" placeholder="Your Brand Name (e.g., MyLuxuryStay)">
    <input type="text" id="compBrand" placeholder="Competitor Brand Name (e.g., DLF Homes)">
    <select id="industry">
        <option value="Real Estate">Real Estate</option>
        <option value="D2C Fashion">D2C Fashion & Apparel</option>
        <option value="B2B SaaS">B2B SaaS / Software</option>
        <option value="E-commerce">General E-commerce</option>
    </select>
    
    <button onclick="generatePrompt()">Analyze & Generate Framework</button>

    <div id="outputContainer" class="output-box">
        <h3>🔥 Generated AI Competitor Intelligence Prompt:</h3>
        <p style="font-size: 0.85rem; color: #e67e22; font-weight: bold;">Copy this framework and paste it into ChatGPT/Gemini for deep analysis.</p>
        <pre id="promptOutput"></pre>
        <button class="copy-btn" onclick="copyPrompt()">📋 Copy Prompt to Clipboard</button>
    </div>
</div>

<script>
function generatePrompt() {
    const myBrand = document.getElementById('myBrand').value || 'Our Brand';
    const compBrand = document.getElementById('compBrand').value || 'The Competitor';
    const industry = document.getElementById('industry').value;

    const promptText = `Act as an expert Market Research Analyst and Growth Marketer. Conduct a deep-dive competitive intelligence analysis within the [${industry}] sector.

Compare my brand "${myBrand}" against the primary competitor "${compBrand}".

Please structure your response into these 3 actionable marketing pillars:
1. TARGET AUDIENCE & PERSONA GAP: Identify segments that "${compBrand}" is currently neglecting or underserving where "${myBrand}" can win.
2. POSITIONING & HOOK ANALYSIS: Analyze "${compBrand}"'s main value proposition and marketing hooks. Contrast it with a recommended counter-positioning strategy for "${myBrand}".
3. ACTIONABLE TRAFFIC & SEO STRATEGY: Provide 3 high-intent keyword categories and content themes that "${compBrand}" ranks for, which "${myBrand}" should aggressively target.`;

    document.getElementById('promptOutput').innerText = promptText;
    document.getElementById('outputContainer').style.display = 'block';
}

function copyPrompt() {
    const text = document.getElementById('promptOutput').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert('Prompt copied! Paste it in ChatGPT or Gemini for full analysis.');
    });
}
</script>

</body>
</html>
